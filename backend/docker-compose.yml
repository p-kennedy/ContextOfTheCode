services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metricsflow"]
      interval: 5s
      timeout: 3s
      retries: 5

  aggregator:
    build: ./aggregator
    env_file: .env
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy

  reporting:
    build: ./reporting
    env_file: .env
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
