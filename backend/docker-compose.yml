services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metricsflow"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-pubsub:
    image: redis:7-alpine
    ports:
      - "5010:6379"
    volumes:
      - redispubsubdata:/data
    command: redis-server --appendonly yes

  aggregator:
    build: ./aggregator
    env_file: .env
    ports:
      - "5008:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis-pubsub:
        condition: service_started

  reporting:
    build: ./reporting
    env_file: .env
    ports:
      - "5009:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redispubsubdata:
